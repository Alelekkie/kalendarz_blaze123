<!DOCTYPE html>
<html lang="pl">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="plan.png">
    <!-- Manifest -->
<link rel="manifest" href="/manifest.json">

<!-- Kolor paska na iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Tytuł aplikacji na iOS -->
<meta name="apple-mobile-web-app-title" content="Plan zadań">


<!-- Kolor paska przeglądarki na Android -->
<meta name="theme-color" content="#ff1493">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan zadań</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #111;
    color: #fff;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px;
    background: #000;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

#addBtn {
    background: hotpink;
    color: #000;
    font-weight: bold;
    font-size: 18px;
}

#archiveBtn {
    background: #555;
    color: #fff;
}

.container {
    padding: 15px;
}

.task {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.red { background: #ff3b3b; }
.orange { background: #ff9d00; }
.green { background: #2ecc71; }
.gray { background: #555; }

.hidden { display: none !important; }

.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none; /* DOMYŚLNIE UKRYTY */
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-content {
    background: #222;
    padding: 20px;
    border-radius: 12px;
    width: 320px;
    box-shadow: 0 4px 15px rgba(255,20,147,0.4);
}

input, textarea {
    width: 90%;
    margin-bottom: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 2px solid hotpink;
    background: #222;
    color: #fff;
    font-size: 16px;
    transition: all 0.3s ease;
}

input:focus, textarea:focus {
    outline: none;
    border-color: deeppink;
    box-shadow: 0 0 10px hotpink;
}

/* Przycisk Zapisz */
#saveBtn {
    width: 100%;
    padding: 12px 0;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, hotpink, deeppink);
    color: #fff;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 8px rgba(255,20,147,0.4);
}

#saveBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(255,20,147,0.6);
}

#saveBtn:active {
    transform: translateY(0);
    box-shadow: 0 3px 6px rgba(255,20,147,0.4);
}
</style>
</head>
<body>

<header>
<button id="addBtn">+</button>
<h2>ZADANIA</h2>
<button id="archiveBtn">Archiwum</button>
</header>

<div class="container" id="taskList"></div>
<div class="container hidden" id="archiveList"></div>

<div class="modal hidden" id="modal">
  <div class="modal-content">
    <h3>DODAJ NOWE ZADANIE</h3>
    <input type="datetime-local" id="date">
    <textarea id="desc" placeholder="Opis"></textarea>
    <button id="saveBtn">Zapisz</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAryTIyJW1pEfye1zWxwNSZZxR7fiPjQFc",
  authDomain: "kalendarz-af3d4.firebaseapp.com",
  projectId: "kalendarz-af3d4",
  storageBucket: "kalendarz-af3d4.firebasestorage.app",
  messagingSenderId: "227083875151",
  appId: "1:227083875151:web:23a7b40e43654015998b3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let showArchive = false;

// Renderowanie zadań
async function render() {
    const now = new Date();
    const snapshot = await getDocs(collection(db, "tasks"));
    const tasks = snapshot.docs.map(d => ({id: d.id, ...d.data()}));

    const taskList = document.getElementById('taskList');
    const archiveList = document.getElementById('archiveList');
    taskList.innerHTML = '';
    archiveList.innerHTML = '';

    let active = [];
    let archive = [];

    for(const task of tasks){
        if(new Date(task.date) < now && !task.done){
            await updateDoc(doc(db,"tasks",task.id), {done:true});
            task.done = true;
        }
        if(task.done) archive.push(task);
        else active.push(task);
    }

    active.sort((a,b) => new Date(a.date)-new Date(b.date));

    const today = new Date();
    const sevenDaysLater = new Date();
    sevenDaysLater.setDate(today.getDate()+7);
    const upcoming7 = active.filter(t => {
        const d = new Date(t.date);
        return d >= today && d <= sevenDaysLater;
    });

    active.forEach(task => {
        let el = document.createElement('div');
        el.classList.add('task');
        if(upcoming7.includes(task)){
            const index = upcoming7.indexOf(task);
            if(index < 3) el.classList.add('red');
            else if(index < 7) el.classList.add('orange');
            else el.classList.add('green');
        } else {
            el.classList.add('green');
        }
        el.innerHTML = `<b>${new Date(task.date).toLocaleString()}</b><br>${task.desc.substring(0,50)}`;
        el.onclick = ()=>alert(task.desc);
        taskList.appendChild(el);
    });

    archive.forEach(task => {
        let el = document.createElement('div');
        el.classList.add('task','gray');
        el.innerHTML = `<b>${new Date(task.date).toLocaleString()}</b><br>${task.desc}`;
        archiveList.appendChild(el);
    });

    archiveList.style.display = showArchive ? 'block' : 'none';
}

// Dodawanie zadania
document.getElementById('saveBtn').addEventListener('click', async () => {
    const date = document.getElementById('date').value;
    const desc = document.getElementById('desc').value;
    if(!date || !desc) return alert('Uzupełnij dane');
    await addDoc(collection(db, "tasks"), {date, desc, done:false});
    closeModal();
    render();
});

// Modal
function openModal(){
    const m = document.getElementById('modal');
    m.classList.remove('hidden');
    m.style.display = 'flex';
}
function closeModal(){
    const m = document.getElementById('modal');
    m.classList.add('hidden');
    m.style.display = 'none';
}

document.getElementById('addBtn').onclick = openModal;
document.getElementById('archiveBtn').onclick = () => {
    showArchive = !showArchive;
    document.getElementById('archiveList').classList.toggle('hidden');
};

setInterval(render,5000);
render();
</script>

</body>
</html>
