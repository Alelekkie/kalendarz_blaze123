<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<style>
body{font-family:Arial;margin:0;background:#111;color:#fff}
header{display:flex;justify-content:space-between;align-items:center;padding:15px;background:#000}
button{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
#addBtn{background:#0f0;color:#000}
#archiveBtn{background:#555;color:#fff}
.container{padding:15px}
.task{padding:12px;margin-bottom:10px;border-radius:10px;cursor:pointer}
.red{background:#ff3b3b}
.orange{background:#ff9d00}
.green{background:#2ecc71}
.gray{background:#555}
.hidden{display:none}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center}
.modal-content{background:#222;padding:20px;border-radius:10px;width:300px}
input,textarea{width:100%;margin-bottom:10px;padding:8px;border-radius:5px;border:none}
</style>
</head>
<body>
<header>
<button id="addBtn">+</button>
<h2>Zadania</h2>
<button id="archiveBtn">Archiwum</button>
</header>

<div class="container" id="taskList"></div>
<div class="container hidden" id="archiveList"></div>

<div class="modal hidden" id="modal" style="display:none;">
<div class="modal-content">
<h3>Nowe zadanie</h3>
<input type="datetime-local" id="date">
<textarea id="desc" placeholder="Opis"></textarea>
<button onclick="addTask()">Zapisz</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAryTIyJW1pEfye1zWxwNSZZxR7fiPjQFc",
  authDomain: "kalendarz-af3d4.firebaseapp.com",
  projectId: "kalendarz-af3d4",
  storageBucket: "kalendarz-af3d4.firebasestorage.app",
  messagingSenderId: "227083875151",
  appId: "1:227083875151:web:23a7b40e43654015998b3a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let showArchive = false;

async function render(){
  const now = new Date();
  const snapshot = await getDocs(collection(db, "tasks"));
  const tasks = snapshot.docs.map(d => ({id:d.id,...d.data()}));

  const taskList = document.getElementById('taskList');
  const archiveList = document.getElementById('archiveList');
  taskList.innerHTML = '';
  archiveList.innerHTML = '';

  let active = [];
  let archive = [];

  for(const task of tasks){
    if(new Date(task.date) < now && !task.done){
      await updateDoc(doc(db,"tasks",task.id), {done:true});
      task.done = true;
    }
    if(task.done) archive.push(task);
    else active.push(task);
  }

  active.sort((a,b)=>new Date(a.date)-new Date(b.date));

  active.forEach((task,i)=>{
    let el = document.createElement('div');
    el.classList.add('task');
    if(i<3) el.classList.add('red');
    else if(i<7) el.classList.add('orange');
    else el.classList.add('green');
    el.innerHTML = `<b>${new Date(task.date).toLocaleString()}</b><br>${task.desc.substring(0,50)}`;
    el.onclick = ()=>alert(task.desc);
    taskList.appendChild(el);
  });

  archive.forEach(task=>{
    let el = document.createElement('div');
    el.classList.add('task','gray');
    el.innerHTML = `<b>${new Date(task.date).toLocaleString()}</b><br>${task.desc}`;
    archiveList.appendChild(el);
  });
}

async function addTask(){
  const date = document.getElementById('date').value;
  const desc = document.getElementById('desc').value;
  if(!date || !desc) return alert('Uzupełnij dane');
  await addDoc(collection(db, "tasks"), {date, desc, done:false});
  closeModal();
  render();
}

function openModal(){const m=document.getElementById('modal');m.classList.remove('hidden');m.style.display='flex';}
function closeModal(){const m=document.getElementById('modal');m.classList.add('hidden');m.style.display='none';}

document.getElementById('addBtn').onclick=openModal;
document.getElementById('archiveBtn').onclick=()=>{
  showArchive = !showArchive;
  document.getElementById('archiveList').classList.toggle('hidden');
};

setInterval(render,5000);
render();
</script>
</body>
</html>
